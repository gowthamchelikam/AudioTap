name: GameCapture
options:
  bundleIdPrefix: com.audiotap
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  AudioTapApp:
    type: application
    platform: iOS
    sources:
      - path: AudioTapApp
      - path: Shared
    attributes:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: AudioTapApp/Info.plist
      properties:
        CFBundleDisplayName: GameCapture
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiotap.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Z83Z83A3H4
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: AudioTapApp/AudioTapApp.entitlements
    dependencies:
      - target: AudioTapBroadcast

  GameCaptureReceiver:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "13.0"
    sources:
      - path: MacReceiver
    info:
      path: MacReceiver/Info.plist
      properties:
        CFBundleDisplayName: GameCapture Receiver
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiotap.receiver
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Z83Z83A3H4
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MacReceiver/MacReceiver.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true

  AudioTapBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: AudioTapBroadcast
      - path: Shared
    info:
      path: AudioTapBroadcast/Info.plist
      properties:
        CFBundleDisplayName: AudioTapBroadcast
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiotap.app.broadcast
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Z83Z83A3H4
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: AudioTapBroadcast/AudioTapBroadcast.entitlements
